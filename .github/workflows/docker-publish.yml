name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image prefix
        id: image
        shell: bash
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}-backend:latest
            ${{ steps.image.outputs.prefix }}-backend:${{ github.sha }}

      - name: Build and publish MCP server
        uses: docker/build-push-action@v6
        with:
          context: mcp_99bugsincode
          file: mcp_99bugsincode/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}-mcp:latest
            ${{ steps.image.outputs.prefix }}-mcp:${{ github.sha }}

      - name: Build and publish frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}-frontend:latest
            ${{ steps.image.outputs.prefix }}-frontend:${{ github.sha }}
